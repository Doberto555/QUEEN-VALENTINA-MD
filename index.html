<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUEEN VALENTINA MD - Pair Code</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
    padding:40px;
}

.container{
    background: rgba(0,0,0,0.5);
    padding:30px;
    border-radius:15px;
    max-width:400px;
    margin:auto;
}

h1{
    color:#00ffcc;
}

input{
    padding:10px;
    width:90%;
    border:none;
    border-radius:8px;
    margin-top:10px;
}

button{
    padding:12px 25px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#00ffcc;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00cc99;
}

.footer{
    margin-top:20px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">
<h1>🤖 QUEEN VALENTINA MD</h1>
<p>Connecte ton WhatsApp avec Pair Code</p>

<input type="text" placeholder="Entrer ton numéro WhatsApp">

<br>

<button>Générer Pair Code</button>

<p id="code"></p>

<div class="footer">
<p>Powered by Sigma Tech</p>
</div>
</div>

<script>
function generateCode(){
    let code = Math.floor(100000 + Math.random() * 900000);
    document.getElementById("code").innerHTML = 
    "Ton Pair Code : <b>"+code+"</b>";
}
document.querySelector("button").onclick = generateCode;
</script>

</body>
</html>
